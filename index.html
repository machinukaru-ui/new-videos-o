<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>videos</title>

<style>
body{
  margin:0;
  background:#f2f2f2;
  font-family:sans-serif;
}

.container{
  text-align:center;
  padding:20px;
}

.video-box{
  position:relative;
  width:90%;
  max-width:500px;
  height:260px;
  background:black;
  margin:20px auto;
  border-radius:12px;
}

.play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:70px;
  height:70px;
  border-radius:50%;
  border:4px solid white;
}

.play:after{
  content:'';
  position:absolute;
  left:28px;
  top:18px;
  border-left:22px solid white;
  border-top:14px solid transparent;
  border-bottom:14px solid transparent;
}
</style>
</head>

<body>

<div class="container">

<h2>動画まとめ</h2>
<p>新しく見つけ次第追加します</p>

<div class="video-box"
onclick="window.location.href='https://lite.tiktok.com/t/ZS9d6art7k4ph-2j4bt/'">
<div class="play"></div>
</div>

</div>

</body>
</html>
